<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meta Ads Dashboard</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #111827;
    }

    .container {
      max-width: 1240px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 28px;
    }

    .title-area h1 {
      margin: 0 0 8px;
      font-size: 34px;
      color: #1877f2;
    }

    .title-area p {
      margin: 0;
      color: #6b7280;
      font-size: 15px;
    }

    .refresh-button {
      border: none;
      background: #1877f2;
      color: #ffffff;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 6px 18px rgba(24, 119, 242, 0.25);
    }

    .refresh-button:hover {
      background: #0f5fd0;
    }

    .status-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 18px 20px;
      margin-bottom: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      color: #4b5563;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-bottom: 28px;
    }

    .card {
      background: #ffffff;
      padding: 22px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .card .label {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .card .value {
      font-size: 28px;
      font-weight: bold;
      color: #020617;
    }

    .card .small {
      margin-top: 8px;
      font-size: 13px;
      color: #9ca3af;
    }

    .section-title {
      margin: 32px 0 16px;
      font-size: 24px;
      color: #111827;
    }

    .table-wrapper {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    th, td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid #eef0f4;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #f9fafb;
      color: #4b5563;
      font-weight: bold;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    td {
      color: #111827;
    }

    .loading,
    .error {
      background: #ffffff;
      padding: 28px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      text-align: center;
    }

    .error {
      color: #b91c1c;
    }

    .muted {
      color: #6b7280;
    }

    @media (max-width: 900px) {
      .cards {
        grid-template-columns: repeat(2, 1fr);
      }

      .header {
        flex-direction: column;
      }
    }

    @media (max-width: 600px) {
      .cards {
        grid-template-columns: 1fr;
      }

      .title-area h1 {
        font-size: 26px;
      }

      .card .value {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="title-area">
        <h1>Meta Ads Dashboard</h1>
        <p>Acompanhamento dos principais indicadores de campanhas.</p>
      </div>

      <button class="refresh-button" onclick="loadDashboard()">
        Atualizar dados
      </button>
    </div>

    <div id="dashboard">
      <div class="loading">Carregando dados...</div>
    </div>
  </div>

  <script>
    function toNumber(value) {
      if (value === null || value === undefined || value === "") return 0;

      if (typeof value === "object" && value.value !== undefined) {
        return toNumber(value.value);
      }

      if (typeof value === "object" && value.Value !== undefined) {
        return toNumber(value.Value);
      }

      if (typeof value === "number") return value;

      let text = String(value)
        .replace("R$", "")
        .replace("%", "")
        .replace(/\s/g, "")
        .trim();

      if (!text) return 0;

      const hasComma = text.includes(",");
      const hasDot = text.includes(".");

      if (hasComma && hasDot) {
        const lastComma = text.lastIndexOf(",");
        const lastDot = text.lastIndexOf(".");

        if (lastComma > lastDot) {
          text = text.replace(/\./g, "").replace(",", ".");
        } else {
          text = text.replace(/,/g, "");
        }
      } else if (hasComma) {
        text = text.replace(",", ".");
      }

      return Number(text) || 0;
    }

    function formatMoney(value) {
      return toNumber(value).toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
    }

    function formatNumber(value) {
      return Math.round(toNumber(value)).toLocaleString("pt-BR");
    }

    function formatDecimal(value) {
      return toNumber(value).toLocaleString("pt-BR", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function formatPercent(value) {
      return `${formatDecimal(value)}%`;
    }

    function getField(object, ...keys) {
      for (const key of keys) {
        if (
          object &&
          object[key] !== undefined &&
          object[key] !== null &&
          object[key] !== ""
        ) {
          return object[key];
        }
      }

      return "";
    }

    function getActionValue(actions) {
      if (!actions) return 0;

      if (!Array.isArray(actions)) {
        return toNumber(actions);
      }

      const preferredAction = actions.find(action => {
        const type = String(
          action.action_type ||
          action["Action Type"] ||
          action.type ||
          ""
        ).toLowerCase();

        return (
          type.includes("messaging") ||
          type.includes("message") ||
          type.includes("whatsapp") ||
          type.includes("lead")
        );
      });

      const fallbackAction = actions.find(action =>
        action.value !== undefined ||
        action.Value !== undefined
      );

      const action = preferredAction || fallbackAction;

      if (!action) return 0;

      return toNumber(action.value || action.Value || 0);
    }

    function getMessages(campaign) {
      const directMessages = getField(
        campaign,
        "messages",
        "Messages",
        "results",
        "Results"
      );

      const directValue = toNumber(directMessages);

      if (directValue > 0) {
        return directValue;
      }

      const actions = getField(campaign, "actions", "Actions");

      return getActionValue(actions);
    }

    function calculateCostPerMessage(spend, messages, providedValue) {
      const providedNumber = toNumber(providedValue);

      if (providedNumber > 0) {
        return providedNumber;
      }

      const spendNumber = toNumber(spend);
      const messagesNumber = toNumber(messages);

      if (messagesNumber <= 0) {
        return 0;
      }

      return spendNumber / messagesNumber;
    }

    function safeText(value, fallback = "Não informado") {
      if (value === null || value === undefined || value === "") {
        return fallback;
      }

      return value;
    }

    function normalizeCampaigns(campaigns) {
      if (!campaigns) return [];

      if (typeof campaigns === "string") {
        try {
          return normalizeCampaigns(JSON.parse(campaigns));
        } catch {
          return [];
        }
      }

      if (Array.isArray(campaigns)) {
        return campaigns
          .flatMap(item => Array.isArray(item) ? item : [item])
          .filter(Boolean);
      }

      return [];
    }

    function buildCampaignRows(campaigns) {
      if (!campaigns.length) {
        return `
          <tr>
            <td colspan="9">Nenhuma campanha encontrada.</td>
          </tr>
        `;
      }

      return campaigns.map(campaign => {
        const campaignName = getField(
          campaign,
          "campaign_name",
          "Campaign Name",
          "Campaign"
        );

        const adsetName = getField(
          campaign,
          "adset_name",
          "Adset Name",
          "Ad Set Name",
          "Adset"
        );

        const adName = getField(
          campaign,
          "ad_name",
          "Ad Name",
          "Ad"
        );

        const spend = getField(
          campaign,
          "spend",
          "Spend"
        );

        const messages = getMessages(campaign);

        const costPerMessage = getField(
          campaign,
          "cost_per_message",
          "Cost Per Message",
          "Cost Per Action Type"
        );

        const linkClicks = getField(
          campaign,
          "link_clicks",
          "Inline Link Clicks",
          "inline_link_clicks",
          "Link Clicks"
        );

        const ctr = getField(
          campaign,
          "ctr_link",
          "Unique Inline Link Click CTR",
          "Inline Link Click CTR",
          "unique_inline_link_click_ctr",
          "CTR"
        );

        const impressions = getField(
          campaign,
          "impressions",
          "Impressions"
        );

        return `
          <tr>
            <td>${safeText(campaignName, "Campanha não identificada")}</td>
            <td>${safeText(adsetName, "Conjunto não identificado")}</td>
            <td>${safeText(adName, "Anúncio não identificado")}</td>
            <td>${formatNumber(messages)}</td>
            <td>${formatMoney(calculateCostPerMessage(spend, messages, costPerMessage))}</td>
            <td>${formatNumber(linkClicks)}</td>
            <td>${formatPercent(ctr)}</td>
            <td>${formatMoney(spend)}</td>
            <td>${formatNumber(impressions)}</td>
          </tr>
        `;
      }).join("");
    }

    async function loadDashboard() {
      const dashboard = document.getElementById("dashboard");

      dashboard.innerHTML = `
        <div class="loading">Carregando dados...</div>
      `;

      try {
        const response = await fetch("/api/webhook", {
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error("Não foi possível carregar os dados do webhook.");
        }

        const data = await response.json();

        const summary = data.summary || {};
        const campaigns = normalizeCampaigns(data.campaigns);
        const campaignRows = buildCampaignRows(campaigns);

        const summaryMessages = toNumber(summary.messages);
        const summarySpend = toNumber(summary.spend);
        const summaryCpl = calculateCostPerMessage(
          summarySpend,
          summaryMessages,
          summary.cpl
        );

        dashboard.innerHTML = `
          <div class="status-card">
            <div>
              <strong>Última atualização:</strong>
              ${safeText(data.updated_at || data.received_at, "Ainda não informado")}
            </div>
            <div class="muted">
              ${campaigns.length} item(ns) na tabela
            </div>
          </div>

          <div class="cards">
            <div class="card">
              <div class="label">Investimento total</div>
              <div class="value">${formatMoney(summarySpend)}</div>
              <div class="small">Valor investido no período</div>
            </div>

            <div class="card">
              <div class="label">Mensagens</div>
              <div class="value">${formatNumber(summaryMessages)}</div>
              <div class="small">Conversas ou leads gerados</div>
            </div>

            <div class="card">
              <div class="label">Custo por mensagem</div>
              <div class="value">${formatMoney(summaryCpl)}</div>
              <div class="small">Custo médio por resultado</div>
            </div>

            <div class="card">
              <div class="label">CTR</div>
              <div class="value">${formatPercent(summary.ctr)}</div>
              <div class="small">Taxa de clique</div>
            </div>

            <div class="card">
              <div class="label">Cliques</div>
              <div class="value">${formatNumber(summary.clicks)}</div>
              <div class="small">Cliques no link</div>
            </div>

            <div class="card">
              <div class="label">Impressões</div>
              <div class="value">${formatNumber(summary.impressions)}</div>
              <div class="small">Quantidade de exibições</div>
            </div>

            <div class="card">
              <div class="label">Frequência</div>
              <div class="value">${formatDecimal(summary.frequency)}</div>
              <div class="small">Média de vezes por pessoa</div>
            </div>

            <div class="card">
              <div class="label">CPM</div>
              <div class="value">${formatMoney(summary.cpm)}</div>
              <div class="small">Custo por mil impressões</div>
            </div>
          </div>

          <h2 class="section-title">Campanhas</h2>

          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Campanha</th>
                  <th>Conjunto</th>
                  <th>Anúncio</th>
                  <th>Mensagens</th>
                  <th>Custo/mensagem</th>
                  <th>Cliques</th>
                  <th>CTR</th>
                  <th>Investimento</th>
                  <th>Impressões</th>
                </tr>
              </thead>
              <tbody>
                ${campaignRows}
              </tbody>
            </table>
          </div>
        `;
      } catch (error) {
        dashboard.innerHTML = `
          <div class="error">
            <strong>Erro ao carregar o dashboard.</strong>
            <br><br>
            ${error.message}
          </div>
        `;
      }
    }

    loadDashboard();
  </script>
</body>
</html>
