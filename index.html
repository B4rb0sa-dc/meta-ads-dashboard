<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meta Ads Dashboard</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #111827;
    }

    .container {
      max-width: 1240px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 24px;
    }

    .title-area h1 {
      margin: 0 0 8px;
      font-size: 34px;
      color: #1877f2;
    }

    .title-area p {
      margin: 0;
      color: #6b7280;
      font-size: 15px;
    }

    .refresh-button {
      border: none;
      background: #1877f2;
      color: #ffffff;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 6px 18px rgba(24, 119, 242, 0.25);
    }

    .refresh-button:hover {
      background: #0f5fd0;
    }

    .filters {
      background: #ffffff;
      border-radius: 16px;
      padding: 18px 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr auto;
      gap: 14px;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field label {
      font-size: 13px;
      font-weight: bold;
      color: #4b5563;
    }

    select,
    input[type="date"] {
      height: 42px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 0 12px;
      font-size: 14px;
      color: #111827;
      background: #ffffff;
    }

    .apply-button {
      height: 42px;
      border: none;
      border-radius: 10px;
      background: #111827;
      color: #ffffff;
      padding: 0 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .status-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 18px 20px;
      margin-bottom: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      color: #4b5563;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-bottom: 28px;
    }

    .card {
      background: #ffffff;
      padding: 22px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .card .label {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .card .value {
      font-size: 28px;
      font-weight: bold;
      color: #020617;
    }

    .card .small {
      margin-top: 8px;
      font-size: 13px;
      color: #9ca3af;
    }

    .section-title {
      margin: 32px 0 16px;
      font-size: 24px;
      color: #111827;
    }

    .table-wrapper {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1080px;
    }

    th, td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid #eef0f4;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #f9fafb;
      color: #4b5563;
      font-weight: bold;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    td {
      color: #111827;
    }

    .loading,
    .error {
      background: #ffffff;
      padding: 28px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      text-align: center;
    }

    .error {
      color: #b91c1c;
    }

    .muted {
      color: #6b7280;
    }

    @media (max-width: 900px) {
      .cards {
        grid-template-columns: repeat(2, 1fr);
      }

      .header {
        flex-direction: column;
      }

      .filters {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 600px) {
      .cards,
      .filters {
        grid-template-columns: 1fr;
      }

      .title-area h1 {
        font-size: 26px;
      }

      .card .value {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="title-area">
        <h1>Meta Ads Dashboard</h1>
        <p>Acompanhamento dos principais indicadores por período.</p>
      </div>

      <button class="refresh-button" onclick="loadDashboard()">
        Atualizar dados
      </button>
    </div>

    <div id="dashboard">
      <div class="loading">Carregando dados...</div>
    </div>
  </div>

  <script>
    let dashboardData = null;

    function toNumber(value) {
      if (value === null || value === undefined || value === "") return 0;

      if (typeof value === "object" && value.value !== undefined) {
        return toNumber(value.value);
      }

      if (typeof value === "object" && value.Value !== undefined) {
        return toNumber(value.Value);
      }

      if (typeof value === "number") return value;

      let text = String(value)
        .replace("R$", "")
        .replace("%", "")
        .replace(/\s/g, "")
        .trim();

      if (!text) return 0;

      const hasComma = text.includes(",");
      const hasDot = text.includes(".");

      if (hasComma && hasDot) {
        const lastComma = text.lastIndexOf(",");
        const lastDot = text.lastIndexOf(".");

        if (lastComma > lastDot) {
          text = text.replace(/\./g, "").replace(",", ".");
        } else {
          text = text.replace(/,/g, "");
        }
      } else if (hasComma) {
        text = text.replace(",", ".");
      }

      return Number(text) || 0;
    }

    function formatMoney(value) {
      return toNumber(value).toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
    }

    function formatNumber(value) {
      return Math.round(toNumber(value)).toLocaleString("pt-BR");
    }

    function formatDecimal(value) {
      return toNumber(value).toLocaleString("pt-BR", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function formatPercent(value) {
      return `${formatDecimal(value)}%`;
    }

    function safeText(value, fallback = "Não informado") {
      if (value === null || value === undefined || value === "") {
        return fallback;
      }

      return value;
    }

    function getField(object, ...keys) {
      for (const key of keys) {
        if (
          object &&
          object[key] !== undefined &&
          object[key] !== null &&
          object[key] !== ""
        ) {
          return object[key];
        }
      }

      return "";
    }

    function getActionValue(actions) {
      if (!actions) return 0;

      if (!Array.isArray(actions)) {
        return toNumber(actions);
      }

      const preferredAction = actions.find(action => {
        const type = String(
          action.action_type ||
          action["Action Type"] ||
          action.type ||
          ""
        ).toLowerCase();

        return (
          type.includes("messaging") ||
          type.includes("message") ||
          type.includes("whatsapp") ||
          type.includes("lead")
        );
      });

      const fallbackAction = actions.find(action =>
        action.value !== undefined ||
        action.Value !== undefined
      );

      const action = preferredAction || fallbackAction;

      if (!action) return 0;

      return toNumber(action.value || action.Value || 0);
    }

    function getMessages(row) {
      const directMessages = getField(
        row,
        "messages",
        "Messages",
        "results",
        "Results"
      );

      const directValue = toNumber(directMessages);

      if (directValue > 0) {
        return directValue;
      }

      const actions = getField(row, "actions", "Actions");

      return getActionValue(actions);
    }

    function getRowDate(row) {
      return getField(row, "date_start", "Date Start", "dateStart");
    }

    function parseDate(value) {
      if (!value) return null;

      const date = new Date(value);

      if (Number.isNaN(date.getTime())) {
        return null;
      }

      return date;
    }

    function dateKey(date) {
      if (!date) return "";

      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");

      return `${year}-${month}-${day}`;
    }

    function formatDateBR(dateString) {
      const date = parseDate(dateString);

      if (!date) return "Data não informada";

      return date.toLocaleDateString("pt-BR");
    }

    function normalizeRows(data) {
      const source = data.rows || data.campaigns || [];

      if (typeof source === "string") {
        try {
          return normalizeRows({ rows: JSON.parse(source) });
        } catch {
          return [];
        }
      }

      if (Array.isArray(source)) {
        return source
          .flatMap(item => Array.isArray(item) ? item : [item])
          .filter(Boolean);
      }

      return [];
    }

    function getAvailableDateRange(rows) {
      const dates = rows
        .map(row => parseDate(getRowDate(row)))
        .filter(Boolean)
        .sort((a, b) => a - b);

      if (!dates.length) {
        return {
          minDate: null,
          maxDate: null
        };
      }

      return {
        minDate: dates[0],
        maxDate: dates[dates.length - 1]
      };
    }

    function getPeriodRange(rows, period) {
      const { minDate, maxDate } = getAvailableDateRange(rows);

      if (!minDate || !maxDate) {
        return {
          start: null,
          end: null
        };
      }

      if (period === "all") {
        return {
          start: minDate,
          end: maxDate
        };
      }

      const days = Number(period.replace("last_", "").replace("d", ""));

      const start = new Date(maxDate);
      start.setDate(start.getDate() - days + 1);

      return {
        start,
        end: maxDate
      };
    }

    function filterRowsByDate(rows, start, end) {
      if (!start || !end) return rows;

      const startKey = dateKey(start);
      const endKey = dateKey(end);

      return rows.filter(row => {
        const rowDate = parseDate(getRowDate(row));
        if (!rowDate) return false;

        const rowKey = dateKey(rowDate);

        return rowKey >= startKey && rowKey <= endKey;
      });
    }

    function calculateTotals(rows) {
      const totals = rows.reduce((acc, row) => {
        const spend = toNumber(getField(row, "spend", "Spend"));
        const messages = getMessages(row);
        const clicks = toNumber(getField(row, "inline_link_clicks", "Inline Link Clicks", "link_clicks"));
        const impressions = toNumber(getField(row, "impressions", "Impressions"));
        const reach = toNumber(getField(row, "reach", "Reach"));

        acc.spend += spend;
        acc.messages += messages;
        acc.clicks += clicks;
        acc.impressions += impressions;
        acc.reach += reach;

        return acc;
      }, {
        spend: 0,
        messages: 0,
        clicks: 0,
        impressions: 0,
        reach: 0
      });

      totals.cpl = totals.messages > 0 ? totals.spend / totals.messages : 0;
      totals.ctr = totals.impressions > 0 ? (totals.clicks / totals.impressions) * 100 : 0;
      totals.cpm = totals.impressions > 0 ? (totals.spend / totals.impressions) * 1000 : 0;
      totals.frequency = totals.reach > 0 ? totals.impressions / totals.reach : 0;

      return totals;
    }

    function groupRowsByAd(rows) {
      const groups = new Map();

      rows.forEach(row => {
        const campaignName = getField(row, "campaign_name", "Campaign Name", "Campaign");
        const adsetName = getField(row, "adset_name", "Adset Name", "Ad Set Name", "Adset");
        const adName = getField(row, "ad_name", "Ad Name", "Ad");
        const adId = getField(row, "ad_id", "Ad ID");

        const key = adId || `${campaignName}||${adsetName}||${adName}`;

        if (!groups.has(key)) {
          groups.set(key, {
            campaignName,
            adsetName,
            adName,
            spend: 0,
            messages: 0,
            clicks: 0,
            impressions: 0,
            reach: 0,
            days: new Set()
          });
        }

        const item = groups.get(key);

        item.spend += toNumber(getField(row, "spend", "Spend"));
        item.messages += getMessages(row);
        item.clicks += toNumber(getField(row, "inline_link_clicks", "Inline Link Clicks", "link_clicks"));
        item.impressions += toNumber(getField(row, "impressions", "Impressions"));
        item.reach += toNumber(getField(row, "reach", "Reach"));

        const rowDate = getRowDate(row);
        if (rowDate) {
          item.days.add(dateKey(parseDate(rowDate)));
        }
      });

      return Array.from(groups.values())
        .map(item => ({
          ...item,
          cpl: item.messages > 0 ? item.spend / item.messages : 0,
          ctr: item.impressions > 0 ? (item.clicks / item.impressions) * 100 : 0,
          cpm: item.impressions > 0 ? (item.spend / item.impressions) * 1000 : 0,
          frequency: item.reach > 0 ? item.impressions / item.reach : 0,
          daysCount: item.days.size
        }))
        .sort((a, b) => b.spend - a.spend);
    }

    function buildRowsTable(rows) {
      const groupedRows = groupRowsByAd(rows);

      if (!groupedRows.length) {
        return `
          <tr>
            <td colspan="10">Nenhum dado encontrado para o período selecionado.</td>
          </tr>
        `;
      }

      return groupedRows.map(item => `
        <tr>
          <td>${safeText(item.campaignName, "Campanha não identificada")}</td>
          <td>${safeText(item.adsetName, "Conjunto não identificado")}</td>
          <td>${safeText(item.adName, "Anúncio não identificado")}</td>
          <td>${formatNumber(item.messages)}</td>
          <td>${formatMoney(item.cpl)}</td>
          <td>${formatNumber(item.clicks)}</td>
          <td>${formatPercent(item.ctr)}</td>
          <td>${formatMoney(item.spend)}</td>
          <td>${formatNumber(item.impressions)}</td>
          <td>${item.daysCount}</td>
        </tr>
      `).join("");
    }

    function renderDashboard(period = "all", customStart = "", customEnd = "") {
      const dashboard = document.getElementById("dashboard");

      if (!dashboardData) {
        dashboard.innerHTML = `<div class="loading">Carregando dados...</div>`;
        return;
      }

      const allRows = normalizeRows(dashboardData);
      const { minDate, maxDate } = getAvailableDateRange(allRows);

      let start = null;
      let end = null;

      if (period === "custom" && customStart && customEnd) {
        start = parseDate(`${customStart}T00:00:00`);
        end = parseDate(`${customEnd}T23:59:59`);
      } else {
        const range = getPeriodRange(allRows, period);
        start = range.start;
        end = range.end;
      }

      const filteredRows = filterRowsByDate(allRows, start, end);
      const totals = calculateTotals(filteredRows);
      const tableRows = buildRowsTable(filteredRows);

      const periodLabel = start && end
        ? `${formatDateBR(start)} até ${formatDateBR(end)}`
        : "Período não identificado";

      dashboard.innerHTML = `
        <div class="filters">
          <div class="field">
            <label>Período</label>
            <select id="periodSelect" onchange="handlePeriodChange()">
              <option value="all" ${period === "all" ? "selected" : ""}>Todo o período disponível</option>
              <option value="last_1d" ${period === "last_1d" ? "selected" : ""}>Último dia com dados</option>
              <option value="last_3d" ${period === "last_3d" ? "selected" : ""}>Últimos 3 dias</option>
              <option value="last_7d" ${period === "last_7d" ? "selected" : ""}>Últimos 7 dias</option>
              <option value="last_14d" ${period === "last_14d" ? "selected" : ""}>Últimos 14 dias</option>
              <option value="last_30d" ${period === "last_30d" ? "selected" : ""}>Últimos 30 dias</option>
              <option value="last_90d" ${period === "last_90d" ? "selected" : ""}>Últimos 90 dias</option>
              <option value="custom" ${period === "custom" ? "selected" : ""}>Personalizado</option>
            </select>
          </div>

          <div class="field">
            <label>Data inicial</label>
            <input id="customStart" type="date" value="${customStart}" ${period !== "custom" ? "disabled" : ""} />
          </div>

          <div class="field">
            <label>Data final</label>
            <input id="customEnd" type="date" value="${customEnd}" ${period !== "custom" ? "disabled" : ""} />
          </div>

          <button class="apply-button" onclick="applyFilters()">
            Aplicar
          </button>
        </div>

        <div class="status-card">
          <div>
            <strong>Última atualização:</strong>
            ${safeText(dashboardData.updated_at || dashboardData.received_at, "Ainda não informado")}
          </div>

          <div>
            <strong>Período exibido:</strong>
            ${periodLabel}
          </div>

          <div class="muted">
            ${filteredRows.length} linha(s) filtrada(s) de ${allRows.length}
          </div>
        </div>

        <div class="cards">
          <div class="card">
            <div class="label">Investimento total</div>
            <div class="value">${formatMoney(totals.spend)}</div>
            <div class="small">Soma do período selecionado</div>
          </div>

          <div class="card">
            <div class="label">Mensagens</div>
            <div class="value">${formatNumber(totals.messages)}</div>
            <div class="small">Resultados no período</div>
          </div>

          <div class="card">
            <div class="label">Custo por mensagem</div>
            <div class="value">${formatMoney(totals.cpl)}</div>
            <div class="small">Investimento dividido por mensagens</div>
          </div>

          <div class="card">
            <div class="label">Cliques</div>
            <div class="value">${formatNumber(totals.clicks)}</div>
            <div class="small">Cliques no link</div>
          </div>

          <div class="card">
            <div class="label">CTR</div>
            <div class="value">${formatPercent(totals.ctr)}</div>
            <div class="small">Cliques / impressões</div>
          </div>

          <div class="card">
            <div class="label">Impressões</div>
            <div class="value">${formatNumber(totals.impressions)}</div>
            <div class="small">Quantidade de exibições</div>
          </div>

          <div class="card">
            <div class="label">Alcance</div>
            <div class="value">${formatNumber(totals.reach)}</div>
            <div class="small">Soma do alcance diário</div>
          </div>

          <div class="card">
            <div class="label">CPM</div>
            <div class="value">${formatMoney(totals.cpm)}</div>
            <div class="small">Custo por mil impressões</div>
          </div>
        </div>

        <h2 class="section-title">Anúncios por período</h2>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Campanha</th>
                <th>Conjunto</th>
                <th>Anúncio</th>
                <th>Mensagens</th>
                <th>Custo/mensagem</th>
                <th>Cliques</th>
                <th>CTR</th>
                <th>Investimento</th>
                <th>Impressões</th>
                <th>Dias</th>
              </tr>
            </thead>
            <tbody>
              ${tableRows}
            </tbody>
          </table>
        </div>
      `;
    }

    function handlePeriodChange() {
      const period = document.getElementById("periodSelect").value;

      if (period !== "custom") {
        renderDashboard(period);
        return;
      }

      renderDashboard("custom");
    }

    function applyFilters() {
      const period = document.getElementById("periodSelect").value;
      const customStart = document.getElementById("customStart").value;
      const customEnd = document.getElementById("customEnd").value;

      renderDashboard(period, customStart, customEnd);
    }

    async function loadDashboard() {
      const dashboard = document.getElementById("dashboard");

      dashboard.innerHTML = `
        <div class="loading">Carregando dados...</div>
      `;

      try {
        const response = await fetch("/api/webhook", {
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error("Não foi possível carregar os dados do webhook.");
        }

        dashboardData = await response.json();

        renderDashboard("all");
      } catch (error) {
        dashboard.innerHTML = `
          <div class="error">
            <strong>Erro ao carregar o dashboard.</strong>
            <br><br>
            ${error.message}
          </div>
        `;
      }
    }

    loadDashboard();
  </script>
</body>
</html>
